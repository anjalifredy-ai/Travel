<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InternTube</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
    overflow-x:hidden;
    padding-bottom:70px;
}

header{
    position:sticky;
    top:0;
    background:#0f0f0f;
    padding:10px;
    border-bottom:1px solid #222;
    z-index:1000;
}

.topbar{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo{
    font-size:28px;
    font-weight:900;
    color:#ff0000;
}

.search-box{
    flex:1;
    display:flex;
}

.search-box input{
    flex:1;
    min-width:0;
    padding:12px;
    border:none;
    outline:none;
    border-radius:25px 0 0 25px;
    background:#1f1f1f;
    color:white;
}

.search-box button{
    border:none;
    padding:12px 18px;
    background:#ff0000;
    color:white;
    border-radius:0 25px 25px 0;
    cursor:pointer;
}

.categories{
    display:flex;
    overflow-x:auto;
    gap:10px;
    margin-top:12px;
}

.categories::-webkit-scrollbar{
    display:none;
}

.category{
    background:#272727;
    padding:8px 15px;
    border-radius:10px;
    white-space:nowrap;
    cursor:pointer;
}

.category.active{
    background:white;
    color:black;
}

#player iframe{
    width:100%;
    aspect-ratio:16/9;
    border:none;
}

#videos{
    padding:15px;
    display:grid;
    grid-template-columns:1fr;
    gap:20px;
}

.video{
    background:#181818;
    border-radius:15px;
    overflow:hidden;
    cursor:pointer;
}

.video:hover{
    transform:translateY(-3px);
}

.video img{
    width:100%;
    display:block;
}

.video h3{
    padding:10px;
    font-size:15px;
}

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    height:60px;
    background:#121212;
    border-top:1px solid #222;
    display:flex;
    justify-content:space-around;
    align-items:center;
}

.bottom-item{
    text-align:center;
    font-size:12px;
}
</style>
</head>

<body>

<header>

<div class="topbar">
    <div class="logo">InternTube</div>

    <div class="search-box">
        <input id="search" placeholder="Search videos or channels">
        <button onclick="searchVideos()">🔍</button>
    </div>
</div>

<div class="categories">
    <div class="category active">All</div>
    <div class="category" onclick="quickSearch('gaming')">Gaming</div>
    <div class="category" onclick="quickSearch('music')">Music</div>
    <div class="category" onclick="quickSearch('anime')">Anime</div>
    <div class="category" onclick="quickSearch('minecraft')">Minecraft</div>
    <div class="category" onclick="quickSearch('shorts')">Shorts</div>
</div>

</header>

<div id="player"></div>

<div id="videos">
    <h2 style="text-align:center">Search something to start watching 🚀</h2>
</div>

<div class="bottom-nav">
    <div class="bottom-item">🏠<br>Home</div>
    <div class="bottom-item" onclick="quickSearch('shorts')">🎬<br>Shorts</div>
    <div class="bottom-item">🔥<br>Trending</div>
    <div class="bottom-item">👤<br>You</div>
</div>

<script>

async function searchVideos(query=null){

    if(!query){
        query=document.getElementById("search").value;
    }

    if(!query) return;

    document.getElementById("videos").innerHTML =
    "<h2 style='text-align:center'>Loading...</h2>";

    try{

        const response = await fetch(
            `/search?q=${encodeURIComponent(query)}`
        );

        const data = await response.json();

        let html = "";

        data.items.forEach(video=>{

            html += `
            <div class="video"
                onclick="playVideo('${video.id.videoId}')">

                <img src="${video.snippet.thumbnails.high.url}">

                <h3>${video.snippet.title}</h3>

            </div>
            `;
        });

        document.getElementById("videos").innerHTML =
            html || "<h2 style='text-align:center'>No videos found</h2>";

    }catch(err){

        document.getElementById("videos").innerHTML =
        "<h2 style='text-align:center'>Failed to load videos</h2>";

        console.error(err);
    }
}

function quickSearch(q){
    document.getElementById("search").value=q;
    searchVideos(q);
}

function playVideo(id){

    document.getElementById("player").innerHTML = `
    <iframe
        src="https://www.youtube.com/embed/${id}?autoplay=1"
        allowfullscreen
        allow="autoplay">
    </iframe>
    `;

    window.scrollTo({
        top:0,
        behavior:"smooth"
    });
}

document.getElementById("search")
.addEventListener("keypress",function(e){
    if(e.key==="Enter"){
        searchVideos();
    }
});

</script>

</body>
</html>
