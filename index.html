<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ViewTube</title>
<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#272727;--border:#3f3f3f;--text:#f1f1f1;--text2:#aaa;--text3:#717171;--accent:#ff0000;--radius:10px;}
[data-theme="light"]{--bg:#fff;--surface:#f2f2f2;--surface2:#e5e5e5;--border:#ddd;--text:#0f0f0f;--text2:#606060;--text3:#909090;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;overflow-x:hidden;background:var(--bg);color:var(--text);font-family:'Roboto',Arial,sans-serif;}
.topbar{display:flex;align-items:center;gap:8px;padding:0 12px;height:52px;background:var(--bg);position:sticky;top:0;z-index:200;border-bottom:1px solid var(--border);width:100%;}
.brand{display:flex;align-items:center;gap:5px;text-decoration:none;flex-shrink:0;}
.brand-logo{width:26px;height:18px;background:var(--accent);border-radius:4px;display:flex;align-items:center;justify-content:center;}
.brand-logo::after{content:'▶';color:#fff;font-size:10px;}
.brand-name{font-size:17px;font-weight:800;color:var(--text);letter-spacing:-.5px;}
.brand-name b{color:var(--accent);}
.tb-search{flex:1;display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:30px;overflow:hidden;min-width:0;}
.tb-search input{flex:1;background:none;border:none;padding:8px 14px;font-size:14px;color:var(--text);outline:none;min-width:0;width:100%;}
.tb-search input::placeholder{color:var(--text3);}
.tb-search button{background:none;border:none;padding:8px 12px;cursor:pointer;color:var(--text2);font-size:16px;flex-shrink:0;}
.tb-right{display:flex;align-items:center;gap:2px;flex-shrink:0;}
.icon-btn{background:none;border:none;cursor:pointer;padding:8px;border-radius:50%;color:var(--text2);font-size:18px;display:flex;align-items:center;justify-content:center;}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;width:100%;background:var(--bg);border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom);}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;cursor:pointer;font-size:10px;color:var(--text3);gap:3px;border:none;background:none;}
.bn-item.active{color:var(--accent);}
.bn-icon{font-size:22px;line-height:1;}
.page{display:none;width:100%;padding-bottom:70px;}
.page.active{display:block;}
.chip-bar{display:flex;gap:8px;padding:10px 12px;overflow-x:auto;scrollbar-width:none;position:sticky;top:52px;background:var(--bg);z-index:100;border-bottom:1px solid var(--border);width:100%;}
.chip-bar::-webkit-scrollbar{display:none;}
.chip{background:var(--surface2);color:var(--text);padding:6px 12px;border-radius:8px;font-size:13px;cursor:pointer;white-space:nowrap;border:none;flex-shrink:0;}
.chip.active{background:var(--text);color:var(--bg);}
.video-grid{display:grid;grid-template-columns:1fr;gap:0;width:100%;}
.video-card{cursor:pointer;width:100%;border-bottom:6px solid var(--surface);}
.thumb-wrap{position:relative;width:100%;aspect-ratio:16/9;background:var(--surface2);overflow:hidden;}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.thumb-emoji{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:56px;background:var(--surface);}
.duration{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.85);color:#fff;font-size:11px;padding:2px 5px;border-radius:4px;font-weight:600;}
.card-info{display:flex;gap:10px;padding:10px 12px 12px;}
.ch-av{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;}
.card-meta{flex:1;min-width:0;}
.card-title{font-size:14px;font-weight:600;color:var(--text);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-sub{font-size:12px;color:var(--text2);margin-top:3px;}
.watch-player{width:100%;aspect-ratio:16/9;background:#000;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.watch-player iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
.watch-emoji{font-size:72px;}
.big-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35);cursor:pointer;}
.big-play-btn{width:60px;height:42px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;}
.watch-info{padding:12px;}
.watch-title{font-size:16px;font-weight:700;color:var(--text);line-height:1.35;margin-bottom:6px;}
.watch-stats{font-size:13px;color:var(--text2);margin-bottom:10px;}
.action-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;margin-bottom:12px;}
.action-row::-webkit-scrollbar{display:none;}
.act-btn{background:var(--surface2);border:none;border-radius:20px;padding:8px 14px;font-size:13px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0;}
.act-btn.liked{color:var(--accent);}
.ch-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:10px;}
.ch-av-lg{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0;}
.ch-name{font-size:14px;font-weight:700;}
.ch-subs{font-size:12px;color:var(--text2);}
.sub-btn{margin-left:auto;background:var(--text);color:var(--bg);border:none;padding:8px 16px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:700;flex-shrink:0;}
.sub-btn.subbed{background:var(--surface2);color:var(--text);}
.desc-box{background:var(--surface2);border-radius:10px;padding:12px;margin-bottom:12px;cursor:pointer;}
.desc-text{font-size:13px;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.desc-box.expanded .desc-text{-webkit-line-clamp:unset;}
.comments-hdr{font-size:15px;font-weight:700;margin-bottom:12px;}
.comment-input-row{display:flex;gap:8px;margin-bottom:16px;align-items:center;}
.comment-input{flex:1;background:transparent;border:none;border-bottom:1px solid var(--border);padding:6px 0;font-size:13px;color:var(--text);outline:none;min-width:0;}
.comment-post{background:none;border:none;color:var(--accent);font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;}
.comment{display:flex;gap:8px;margin-bottom:14px;}
.com-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
.com-name{font-size:12px;font-weight:700;color:var(--text);}
.com-time{font-size:11px;color:var(--text3);margin-left:5px;font-weight:400;}
.com-text{font-size:13px;color:var(--text);line-height:1.5;margin-top:2px;}
.com-acts{display:flex;gap:10px;margin-top:4px;}
.com-act{background:none;border:none;font-size:12px;color:var(--text2);cursor:pointer;}
.up-next-label{font-size:15px;font-weight:700;padding:12px 12px 8px;border-top:6px solid var(--surface);}
.side-card{display:flex;gap:8px;padding:6px 12px;cursor:pointer;border-bottom:1px solid var(--border);}
.side-thumb{width:120px;flex-shrink:0;aspect-ratio:16/9;border-radius:8px;overflow:hidden;background:var(--surface2);position:relative;display:flex;align-items:center;justify-content:center;font-size:24px;}
.side-thumb img{width:100%;height:100%;object-fit:cover;}
.side-dur{position:absolute;bottom:3px;right:3px;background:rgba(0,0,0,.85);color:#fff;font-size:10px;padding:1px 3px;border-radius:3px;}
.side-meta{flex:1;min-width:0;}
.side-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.side-ch{font-size:11px;color:var(--text2);margin-top:3px;}
.search-result{display:flex;gap:10px;padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--border);}
.sr-thumb{width:120px;flex-shrink:0;aspect-ratio:16/9;border-radius:8px;overflow:hidden;background:var(--surface2);position:relative;display:flex;align-items:center;justify-content:center;font-size:28px;}
.sr-thumb img{width:100%;height:100%;object-fit:cover;}
.sr-dur{position:absolute;bottom:3px;right:3px;background:rgba(0,0,0,.85);color:#fff;font-size:10px;padding:1px 3px;border-radius:3px;}
.sr-meta{flex:1;min-width:0;}
.sr-title{font-size:14px;font-weight:600;color:var(--text);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.sr-info{font-size:12px;color:var(--text2);margin-top:4px;}
.shorts-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:6px;}
.short-card{cursor:pointer;border-radius:10px;overflow:hidden;position:relative;}
.short-thumb{aspect-ratio:9/16;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:48px;border-radius:10px;overflow:hidden;position:relative;}
.short-thumb img{width:100%;height:100%;object-fit:cover;}
.short-overlay{position:absolute;bottom:0;left:0;right:0;padding:10px 8px;background:linear-gradient(transparent,rgba(0,0,0,.85));}
.short-title{font-size:12px;font-weight:600;color:#fff;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.short-views{font-size:11px;color:rgba(255,255,255,.75);margin-top:2px;}
.trend-card{display:flex;gap:10px;padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--border);align-items:flex-start;}
.trend-num{font-size:20px;font-weight:800;color:var(--text3);width:28px;flex-shrink:0;text-align:center;padding-top:4px;}
.trend-thumb{width:110px;flex-shrink:0;aspect-ratio:16/9;border-radius:8px;overflow:hidden;background:var(--surface2);position:relative;display:flex;align-items:center;justify-content:center;font-size:24px;}
.trend-thumb img{width:100%;height:100%;object-fit:cover;}
.trend-meta{flex:1;min-width:0;}
.trend-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.trend-info{font-size:12px;color:var(--text2);margin-top:4px;}
.profile-header{background:linear-gradient(135deg,#ff0000,#cc0000);padding:30px 16px 20px;text-align:center;}
.profile-av{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#fff;margin:0 auto 10px;}
.profile-name{font-size:18px;font-weight:700;color:#fff;}
.profile-stats{display:flex;justify-content:center;gap:32px;margin-top:14px;}
.pstat{text-align:center;}
.pstat-num{font-size:18px;font-weight:700;color:#fff;}
.pstat-label{font-size:11px;color:rgba(255,255,255,.75);}
.menu-item{display:flex;align-items:center;gap:14px;padding:14px 16px;cursor:pointer;border-bottom:1px solid var(--border);font-size:14px;color:var(--text);}
.menu-icon{font-size:20px;width:24px;text-align:center;}
.loading{display:flex;flex-direction:column;gap:12px;padding:12px;}
.skel{background:var(--surface2);border-radius:8px;position:relative;overflow:hidden;}
.skel::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);animation:shim 1.5s infinite;}
@keyframes shim{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:#333;color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body data-theme="dark">

<div class="topbar">
  <a class="brand" href="#" onclick="showPage('home');return false;">
    <div class="brand-logo"></div>
    <div class="brand-name">View<b>Tube</b></div>
  </a>
  <div class="tb-search">
    <input type="text" id="searchInput" placeholder="Search videos..." onkeydown="if(event.key==='Enter')doSearch(this.value)" autocomplete="off">
    <button onclick="doSearch(document.getElementById('searchInput').value)">🔍</button>
  </div>
  <div class="tb-right">
    <button class="icon-btn" onclick="toggleTheme()">🌓</button>
    <div class="avatar" onclick="showPage('profile')">V</div>
  </div>
</div>

<div id="homePage" class="page active">
  <div class="chip-bar" id="chipBar"></div>
  <div id="homeContent"></div>
</div>

<div id="searchPage" class="page">
  <div id="searchContent" style="padding-top:8px;"></div>
</div>

<div id="shortsPage" class="page">
  <div style="padding:12px 12px 6px;font-size:18px;font-weight:800;">⚡ Shorts</div>
  <div class="shorts-grid" id="shortsGrid"></div>
</div>

<div id="trendingPage" class="page">
  <div style="padding:14px 12px 6px;font-size:18px;font-weight:800;">🔥 Trending</div>
  <div id="trendingContent"></div>
</div>

<div id="watchPage" class="page"></div>

<div id="profilePage" class="page">
  <div class="profile-header">
    <div class="profile-av">V</div>
    <div class="profile-name">ViewTube User</div>
    <div class="profile-stats">
      <div class="pstat"><div class="pstat-num" id="likedCount">0</div><div class="pstat-label">Liked</div></div>
      <div class="pstat"><div class="pstat-num" id="savedCount">0</div><div class="pstat-label">Saved</div></div>
      <div class="pstat"><div class="pstat-num" id="histCount">0</div><div class="pstat-label">Watched</div></div>
    </div>
  </div>
  <div class="menu-item" onclick="toggleTheme()"><span class="menu-icon">🌓</span>Toggle Theme</div>
  <div class="menu-item" onclick="showToast('📹 Upload coming soon!')"><span class="menu-icon">📹</span>Upload Video</div>
  <div class="menu-item" onclick="showToast('🔔 Notifications coming soon!')"><span class="menu-icon">🔔</span>Notifications</div>
</div>

<div class="bottom-nav">
  <button class="bn-item active" id="bn-home" onclick="showPage('home')"><span class="bn-icon">🏠</span>Home</button>
  <button class="bn-item" id="bn-shorts" onclick="showPage('shorts')"><span class="bn-icon">⚡</span>Shorts</button>
  <button class="bn-item" id="bn-trending" onclick="showPage('trending')"><span class="bn-icon">🔥</span>Trending</button>
  <button class="bn-item" id="bn-profile" onclick="showPage('profile')"><span class="bn-icon">👤</span>You</button>
</div>

<div class="toast" id="toast"></div>

<script>
const COLORS=['#f44336','#e91e63','#9c27b0','#3f51b5','#2196f3','#00bcd4','#4caf50','#ff9800','#795548','#607d8b'];
function clr(s){return COLORS[(s||'V').charCodeAt(0)%COLORS.length];}

// Global video stores
let G_HOME=[], G_TREND=[], G_SEARCH=[], G_SHORTS=[];
let liked=new Set(), saved=new Set(), watchHist=[];

const CHIPS=['All','Music','Gaming','News','Cricket','Coding','Comedy','Cooking','Tech','Science','Travel','Fitness'];
const MOCK=[
  {id:'dQw4w9WgXcQ',title:'India vs England Test 2026 — Day 2 Highlights',channel:'ESPN Cricinfo',views:'2.3M',ago:'2 hours ago',dur:'18:34',emoji:'🏏',cat:'Cricket',desc:'Full highlights from Day 2 of the Test match!'},
  {id:'9bZkp7q19f0',title:'Building Full Stack App with Next.js 15',channel:'Fireship',views:'890K',ago:'1 day ago',dur:'24:15',emoji:'💻',cat:'Coding',desc:'Complete full-stack app tutorial from scratch.'},
  {id:'kJQP7kiw5Fk',title:'TOP 10 Bollywood Songs 2026',channel:'T-Series',views:'15M',ago:'3 days ago',dur:'42:10',emoji:'🎵',cat:'Music',desc:'Biggest Bollywood hits of 2026!'},
  {id:'OPf0YbXqDm0',title:'100 Hours in Minecraft Hardcore',channel:'Dream',views:'4.1M',ago:'5 days ago',dur:'31:22',emoji:'🎮',cat:'Gaming',desc:'100 hours of pure Minecraft survival.'},
  {id:'hT_nvWreIhg',title:'Budget 2026 EXPLAINED in 10 Minutes',channel:'CA Rachana Ranade',views:'3.2M',ago:'1 week ago',dur:'10:45',emoji:'💰',cat:'News',desc:'Breaking down Union Budget 2026.'},
  {id:'XqZsoesa55w',title:'ChatGPT vs Claude vs Gemini 2026',channel:'MKBHD',views:'5.6M',ago:'2 weeks ago',dur:'19:48',emoji:'🤖',cat:'Tech',desc:'Ultimate AI showdown 2026.'},
  {id:'bNyUyrR0PHo',title:'Butter Chicken Recipe | Restaurant Style',channel:'Hebbars Kitchen',views:'7.8M',ago:'3 weeks ago',dur:'15:20',emoji:'🍗',cat:'Cooking',desc:'Perfect restaurant-style Butter Chicken!'},
  {id:'C0DPdy98e4c',title:'How Black Holes Actually Work',channel:'Kurzgesagt',views:'12M',ago:'1 month ago',dur:'14:33',emoji:'🌌',cat:'Science',desc:'Visual explanation of black holes.'},
  {id:'uelHwf8o7_U',title:'Stand Up Comedy — Family Problems',channel:'Zakir Khan',views:'9.3M',ago:'2 months ago',dur:'58:12',emoji:'😂',cat:'Comedy',desc:'Hilarious new stand-up special!'},
  {id:'5qap5aO4i9A',title:'30 Day Workout Transformation',channel:'Fitness With Ankit',views:'2.7M',ago:'3 months ago',dur:'20:44',emoji:'💪',cat:'Fitness',desc:'Complete body transformation in 30 days.'},
  {id:'e-ORhEE9VVg',title:'Mountain Biking in Manali',channel:'Bike With Girl',views:'1.1M',ago:'1 month ago',dur:'22:05',emoji:'🚵',cat:'Travel',desc:'Most dangerous trail in Manali!'},
  {id:'JGwWNGJdvx8',title:'iPhone 18 Pro — Honest Review',channel:'MKBHD',views:'8.9M',ago:'3 months ago',dur:'16:07',emoji:'📱',cat:'Tech',desc:'30 days with iPhone 18 Pro.'},
];
const MOCK_SHORTS=[
  {title:'Coding trick that blew my mind',views:'4.2M',emoji:'💻'},
  {title:'Perfect chai in 2 minutes',views:'8.1M',emoji:'☕'},
  {title:'India wins! Last ball thriller',views:'12M',emoji:'🏏'},
  {title:'DIY phone stand',views:'2.3M',emoji:'📱'},
  {title:'5 VS Code shortcuts you need',views:'3.7M',emoji:'⚡'},
  {title:'Street food in Old Delhi',views:'6.5M',emoji:'🌮'},
  {title:'Monsoon in Mumbai',views:'9.2M',emoji:'🌧️'},
  {title:'AI art in 10 seconds',views:'5.1M',emoji:'🎨'},
];

window.addEventListener('DOMContentLoaded',()=>{
  initChips();
  loadHome();
  loadShorts();
  loadTrending();
});

function initChips(){
  document.getElementById('chipBar').innerHTML=CHIPS.map((c,i)=>
    `<button class="chip${i===0?' active':''}" onclick="filterChip(this,'${c}')">${c}</button>`
  ).join('');
}
function filterChip(el,cat){
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  const src=G_HOME.length?G_HOME:MOCK;
  const f=cat==='All'?src:src.filter(v=>(v.cat||'').toLowerCase()===cat.toLowerCase());
  renderHomeGrid(f.length?f:src);
}

async function loadHome(){
  showSkel('homeContent');
  try{
    const r=await fetch('/api/youtube?type=home');
    const d=await r.json();
    if(d.videos&&d.videos.length){G_HOME=d.videos;renderHomeGrid(d.videos);}
    else{G_HOME=MOCK;renderHomeGrid(MOCK);}
  }catch{G_HOME=MOCK;renderHomeGrid(MOCK);}
}

function renderHomeGrid(videos){
  document.getElementById('homeContent').innerHTML=`<div class="video-grid">${videos.map((v,i)=>`
    <div class="video-card" onclick="openWatchIdx(${i},'home')">
      <div class="thumb-wrap">
        ${v.thumbnail?`<img src="${v.thumbnail}" alt="" loading="lazy" onerror="this.parentNode.querySelector('.thumb-emoji').style.display='flex';this.remove();">`:''}
        <div class="thumb-emoji" style="${v.thumbnail?'display:none':'display:flex'}">${v.emoji||'▶️'}</div>
        <div class="duration">${v.dur||v.duration||''}</div>
      </div>
      <div class="card-info">
        <div class="ch-av" style="background:${clr(v.channel)}">${(v.channel||'V')[0]}</div>
        <div class="card-meta">
          <div class="card-title">${v.title||''}</div>
          <div class="card-sub">${v.channel||''} • ${v.views||''} • ${v.ago||''}</div>
        </div>
      </div>
    </div>`).join('')}</div>`;
}

function openWatchIdx(i,src){
  const arr=src==='home'?G_HOME:src==='trend'?G_TREND:src==='search'?G_SEARCH:MOCK;
  const v=arr[i]||MOCK[0];
  openWatch(v);
}

function openWatch(v){
  if(!v)return;
  watchHist.unshift(v);
  updateStats();
  const isLiked=liked.has(v.id);
  const isSaved=saved.has(v.id);
  const related=(G_HOME.length?G_HOME:MOCK).filter(x=>x.id!==v.id).slice(0,8);

  document.getElementById('watchPage').innerHTML=`
    <div class="watch-player" id="playerWrap">
      ${v.thumbnail?`<img src="${v.thumbnail}" style="width:100%;height:100%;object-fit:cover;" onerror="this.remove();">`:''}
      <div class="watch-emoji" id="watchEmoji" style="${v.thumbnail?'display:none':''}"> ${v.emoji||'▶️'}</div>
      <div class="big-play" id="bigPlay" onclick="playVid('${v.id}')">
        <div class="big-play-btn">▶</div>
      </div>
    </div>
    <div class="watch-info">
      <div class="watch-title">${v.title||''}</div>
      <div class="watch-stats">${v.views||''} views • ${v.ago||''}</div>
      <div class="action-row">
        <button class="act-btn${isLiked?' liked':''}" id="likeBtn" onclick="toggleLike('${v.id}')">👍 Like</button>
        <button class="act-btn" onclick="toggleLike('${v.id}',true)">👎</button>
        <button class="act-btn" onclick="showToast('🔗 Link copied!')">🔗 Share</button>
        <button class="act-btn" id="saveBtn" onclick="toggleSave('${v.id}')">${isSaved?'✅ Saved':'📥 Save'}</button>
        <button class="act-btn" onclick="showToast('⬇️ Download coming soon!')">⬇️ Download</button>
      </div>
      <div class="ch-row">
        <div class="ch-av-lg" style="background:${clr(v.channel)}">${(v.channel||'V')[0]}</div>
        <div style="flex:1;min-width:0;">
          <div class="ch-name">${v.channel||''} ✓</div>
          <div class="ch-subs">Tap to see channel</div>
        </div>
        <button class="sub-btn" id="subBtn" onclick="toggleSub(this)">Subscribe</button>
      </div>
      <div class="desc-box" onclick="this.classList.toggle('expanded')">
        <div class="desc-text">${v.desc||v.description||'No description available.'}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:4px;font-weight:600;">...more</div>
      </div>
      <div class="comments-hdr">💬 Comments</div>
      <div class="comment-input-row">
        <div class="com-av" style="background:var(--accent)">V</div>
        <input class="comment-input" id="comInput" placeholder="Add a comment..." onkeydown="if(event.key==='Enter')postComment()">
        <button class="comment-post" onclick="postComment()">Post</button>
      </div>
      <div id="comList">${mockComments()}</div>
    </div>
    <div class="up-next-label">Up next</div>
    ${related.map((r,i)=>`
      <div class="side-card" onclick="openWatchIdx(${i},'home')">
        <div class="side-thumb">
          ${r.thumbnail?`<img src="${r.thumbnail}" alt="" loading="lazy" onerror="this.style.display='none'">`:''}
          <span style="${r.thumbnail?'display:none':''}"> ${r.emoji||'▶️'}</span>
          <div class="side-dur">${r.dur||r.duration||''}</div>
        </div>
        <div class="side-meta">
          <div class="side-title">${r.title||''}</div>
          <div class="side-ch">${r.channel||''} • ${r.views||''}</div>
        </div>
      </div>`).join('')}`;
  showPage('watch');
  window.scrollTo(0,0);
}

function playVid(id){
  const bp=document.getElementById('bigPlay');
  if(bp)bp.style.display='none';
  const wrap=document.getElementById('playerWrap');
  if(!wrap)return;
  const ifr=document.createElement('iframe');
  ifr.src=`https://www.youtube.com/embed/${id}?autoplay=1&playsinline=1`;
  ifr.allow='autoplay;encrypted-media;fullscreen';
  ifr.allowFullscreen=true;
  wrap.appendChild(ifr);
}

function toggleLike(id,dis=false){
  if(dis){showToast('👎 Thanks for feedback');return;}
  const btn=document.getElementById('likeBtn');
  if(liked.has(id)){liked.delete(id);if(btn)btn.classList.remove('liked');}
  else{liked.add(id);if(btn)btn.classList.add('liked');showToast('👍 Added to liked videos');}
  updateStats();
}
function toggleSave(id){
  const btn=document.getElementById('saveBtn');
  if(saved.has(id)){saved.delete(id);if(btn)btn.textContent='📥 Save';}
  else{saved.add(id);if(btn)btn.textContent='✅ Saved';showToast('⏰ Saved to Watch Later');}
  updateStats();
}
function toggleSub(btn){
  if(btn.classList.contains('subbed')){btn.classList.remove('subbed');btn.textContent='Subscribe';}
  else{btn.classList.add('subbed');btn.textContent='✅ Subscribed';showToast('🔔 Subscribed!');}
}
function postComment(){
  const inp=document.getElementById('comInput');
  const txt=(inp.value||'').trim();
  if(!txt)return;
  document.getElementById('comList').insertAdjacentHTML('afterbegin',
    `<div class="comment"><div class="com-av" style="background:var(--accent)">V</div><div><div class="com-name">You <span class="com-time">just now</span></div><div class="com-text">${txt}</div></div></div>`);
  inp.value='';showToast('💬 Comment posted!');
}
function mockComments(){
  return[
    {n:'Aakash Singh',c:'#f44336',t:'2h ago',txt:'Amazing video! 🔥'},
    {n:'Priya Sharma',c:'#2196f3',t:'5h ago',txt:'Best explanation ever. Please make more!'},
    {n:'Rahul Kumar',c:'#4caf50',t:'1d ago',txt:'Bhai ye gold hai 👑'},
    {n:'Sneha Patel',c:'#ff9800',t:'2d ago',txt:'Already subscribed! 🙌'},
  ].map(c=>`<div class="comment"><div class="com-av" style="background:${c.c}">${c.n[0]}</div><div><div class="com-name">${c.n}<span class="com-time">${c.t}</span></div><div class="com-text">${c.txt}</div><div class="com-acts"><button class="com-act">👍</button><button class="com-act">Reply</button></div></div></div>`).join('');
}

async function loadShorts(){
  try{
    const r=await fetch('/api/youtube?type=shorts');
    const d=await r.json();
    G_SHORTS=d.videos&&d.videos.length?d.videos:MOCK_SHORTS;
  }catch{G_SHORTS=MOCK_SHORTS;}
  renderShorts(G_SHORTS);
}
function renderShorts(items){
  document.getElementById('shortsGrid').innerHTML=items.map(s=>`
    <div class="short-card" onclick="showToast('⚡ Opening...')">
      <div class="short-thumb">
        ${s.thumbnail?`<img src="${s.thumbnail}" alt="" loading="lazy" onerror="this.style.display='none'">`:''}
        <span style="${s.thumbnail?'display:none':''}">${s.emoji||'▶️'}</span>
        <div class="short-overlay">
          <div class="short-title">${s.title||''}</div>
          <div class="short-views">${s.views||''} views</div>
        </div>
      </div>
    </div>`).join('');
}

async function loadTrending(){
  try{
    const r=await fetch('/api/youtube?type=trending');
    const d=await r.json();
    G_TREND=d.videos&&d.videos.length?d.videos:MOCK;
  }catch{G_TREND=MOCK;}
  renderTrending(G_TREND);
}
function renderTrending(videos){
  document.getElementById('trendingContent').innerHTML=videos.map((v,i)=>`
    <div class="trend-card" onclick="openWatchIdx(${i},'trend')">
      <div class="trend-num">${i+1}</div>
      <div class="trend-thumb">
        ${v.thumbnail?`<img src="${v.thumbnail}" alt="" loading="lazy" onerror="this.style.display='none'">`:''}
        <span style="${v.thumbnail?'display:none':''}">${v.emoji||'▶️'}</span>
      </div>
      <div class="trend-meta">
        <div class="trend-title">${v.title||''}</div>
        <div class="trend-info">${v.channel||''} • ${v.views||''} views</div>
      </div>
    </div>`).join('');
}

async function doSearch(q){
  q=(q||'').trim();if(!q)return;
  document.getElementById('searchInput').value=q;
  showPage('search');
  document.getElementById('searchContent').innerHTML='<div style="padding:20px;color:var(--text2)">⏳ Searching...</div>';
  try{
    const r=await fetch('/api/youtube?type=search&q='+encodeURIComponent(q));
    const d=await r.json();
    G_SEARCH=d.videos&&d.videos.length?d.videos:MOCK;
  }catch{G_SEARCH=MOCK;}
  document.getElementById('searchContent').innerHTML=
    `<div style="padding:8px 12px;font-size:13px;color:var(--text2);">Results for "<strong style="color:var(--text)">${q}</strong>"</div>`+
    G_SEARCH.map((v,i)=>`
      <div class="search-result" onclick="openWatchIdx(${i},'search')">
        <div class="sr-thumb">
          ${v.thumbnail?`<img src="${v.thumbnail}" alt="" loading="lazy" onerror="this.style.display='none'">`:''}
          <span style="${v.thumbnail?'display:none':''}">${v.emoji||'▶️'}</span>
          <div class="sr-dur">${v.dur||v.duration||''}</div>
        </div>
        <div class="sr-meta">
          <div class="sr-title">${v.title||''}</div>
          <div class="sr-info">${v.channel||''} • ${v.views||''} • ${v.ago||''}</div>
        </div>
      </div>`).join('');
}

const ALL_PAGES=['home','search','shorts','trending','watch','profile'];
function showPage(name){
  ALL_PAGES.forEach(p=>{const el=document.getElementById(p+'Page');if(el)el.classList.remove('active');});
  const el=document.getElementById(name+'Page');
  if(el)el.classList.add('active');
  document.querySelectorAll('.bn-item').forEach(b=>b.classList.remove('active'));
  const m={home:'bn-home',shorts:'bn-shorts',trending:'bn-trending',profile:'bn-profile'};
  if(m[name])document.getElementById(m[name]).classList.add('active');
  if(name!=='watch')window.scrollTo(0,0);
}
function toggleTheme(){
  const d=document.body.getAttribute('data-theme')==='dark';
  document.body.setAttribute('data-theme',d?'light':'dark');
  showToast(d?'☀️ Light mode':'🌙 Dark mode');
}
function updateStats(){
  document.getElementById('likedCount').textContent=liked.size;
  document.getElementById('savedCount').textContent=saved.size;
  document.getElementById('histCount').textContent=watchHist.length;
}
function showSkel(id){
  document.getElementById(id).innerHTML=`<div class="loading">${[1,2,3].map(()=>`
    <div><div class="skel" style="width:100%;aspect-ratio:16/9;margin-bottom:8px;"></div>
    <div style="display:flex;gap:10px;padding:0 12px;">
      <div class="skel" style="width:36px;height:36px;border-radius:50%;flex-shrink:0;"></div>
      <div style="flex:1;"><div class="skel" style="height:14px;margin-bottom:6px;border-radius:4px;"></div>
      <div class="skel" style="height:12px;width:60%;border-radius:4px;"></div></div>
    </div></div>`).join('')}</div>`;
}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
</script>
</body>
