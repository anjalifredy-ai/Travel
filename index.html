<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ViewTube</title>
<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#272727;--border:#3f3f3f;--text:#f1f1f1;--text2:#aaa;--text3:#717171;--accent:#ff0000;}
[data-theme="light"]{--bg:#fff;--surface:#f2f2f2;--surface2:#e5e5e5;--border:#ddd;--text:#0f0f0f;--text2:#606060;--text3:#909090;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;overflow-x:hidden;background:var(--bg);color:var(--text);font-family:'Roboto',Arial,sans-serif;}
.topbar{display:flex;align-items:center;gap:8px;padding:0 12px;height:52px;background:var(--bg);position:sticky;top:0;z-index:200;border-bottom:1px solid var(--border);width:100%;}
.brand{display:flex;align-items:center;gap:5px;text-decoration:none;flex-shrink:0;}
.brand-logo{width:26px;height:18px;background:var(--accent);border-radius:4px;display:flex;align-items:center;justify-content:center;}
.brand-logo::after{content:'▶';color:#fff;font-size:10px;}
.brand-name{font-size:17px;font-weight:800;color:var(--text);letter-spacing:-.5px;}
.brand-name b{color:var(--accent);}
.tb-search{flex:1;display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:30px;overflow:hidden;min-width:0;}
.tb-search input{flex:1;background:none;border:none;padding:8px 14px;font-size:14px;color:var(--text);outline:none;min-width:0;width:100%;}
.tb-search input::placeholder{color:var(--text3);}
.tb-search button{background:none;border:none;padding:8px 12px;cursor:pointer;color:var(--text2);font-size:16px;flex-shrink:0;}
.tb-right{display:flex;align-items:center;gap:2px;flex-shrink:0;}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.icon-btn{background:none;border:none;cursor:pointer;padding:8px;border-radius:50%;color:var(--text2);font-size:18px;display:flex;align-items:center;justify-content:center;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;width:100%;background:var(--bg);border-top:1px solid var(--border);display:flex;z-index:200;}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;cursor:pointer;font-size:10px;color:var(--text3);gap:3px;border:none;background:none;}
.bn-item.active{color:var(--accent);}
.bn-icon{font-size:22px;line-height:1;}
.page{display:none;width:100%;padding-bottom:70px;}
.page.active{display:block;}
.chip-bar{display:flex;gap:8px;padding:10px 12px;overflow-x:auto;scrollbar-width:none;position:sticky;top:52px;background:var(--bg);z-index:100;border-bottom:1px solid var(--border);width:100%;}
.chip-bar::-webkit-scrollbar{display:none;}
.chip{background:var(--surface2);color:var(--text);padding:6px 12px;border-radius:8px;font-size:13px;cursor:pointer;white-space:nowrap;border:none;flex-shrink:0;}
.chip.active{background:var(--text);color:var(--bg);}
.video-grid{display:grid;grid-template-columns:1fr;gap:0;width:100%;}
.video-card{cursor:pointer;width:100%;border-bottom:6px solid var(--surface);}
.thumb-wrap{position:relative;width:100%;aspect-ratio:16/9;background:var(--surface2);overflow:hidden;}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.thumb-emoji{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:56px;background:var(--surface);}
.duration{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.85);color:#fff;font-size:11px;padding:2px 5px;border-radius:4px;font-weight:600;}
.card-info{display:flex;gap:10px;padding:10px 12px 12px;}
.ch-av{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;}
.card-meta{flex:1;min-width:0;}
.card-title{font-size:14px;font-weight:600;color:var(--text);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-sub{font-size:12px;color:var(--text2);margin-top:3px;}
.card-ch-name{cursor:pointer;text-decoration:underline;}
.watch-player{width:100%;aspect-ratio:16/9;background:#000;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.watch-player iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
.watch-emoji{font-size:72px;position:absolute;}
.big-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35);cursor:pointer;z-index:2;}
.big-play-btn{width:60px;height:42px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;}
.watch-info{padding:12px;}
.watch-title{font-size:16px;font-weight:700;color:var(--text);line-height:1.35;margin-bottom:6px;}
.watch-stats{font-size:13px;color:var(--text2);margin-bottom:10px;}
.action-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;margin-bottom:12px;}
.action-row::-webkit-scrollbar{display:none;}
.act-btn{background:var(--surface2);border:none;border-radius:20px;padding:8px 14px;font-size:13px;color:var(--text);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.act-btn.liked{color:var(--accent);}
.ch-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:10px;cursor:pointer;}
.ch-av-lg{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0;}
.ch-name{font-size:14px;font-weight:700;}
.ch-subs{font-size:12px;color:var(--text2);}
.sub-btn{margin-left:auto;background:var(--text);color:var(--bg);border:none;padding:8px 16px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:700;flex-shrink:0;}
.sub-btn.subbed{background:var(--surface2);color:var(--text);}
.desc-box{background:var(--surface2);border-radius:10px;padding:12px;margin-bottom:12px;cursor:pointer;}
.desc-text{font-size:13px;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.desc-box.expanded .desc-text{-webkit-line-clamp:unset;}
.comments-hdr{font-size:15px;font-weight:700;margin-bottom:12px;}
.comment-input-row{display:flex;gap:8px;margin-bottom:16px;align-items:center;}
.comment-input{flex:1;background:transparent;border:none;border-bottom:1px solid var(--border);padding:6px 0;font-size:13px;color:var(--text);outline:none;min-width:0;}
.comment-post{background:none;border:none;color:var(--accent);font-size:13px;font-weight:700;cursor:pointer;}
.comment{display:flex;gap:8px;margin-bottom:14px;}
.com-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
.com-name{font-size:12px;font-weight:700;color:var(--text);}
.com-time{font-size:11px;color:var(--text3);margin-left:5px;font-weight:400;}
.com-text{font-size:13px;color:var(--text);line-height:1.5;margin-top:2px;}
.up-next-label{font-size:15px;font-weight:700;padding:12px 12px 8px;border-top:6px solid var(--surface);}
.side-card{display:flex;gap:8px;padding:6px 12px;cursor:pointer;border-bottom:1px solid var(--border);}
.side-thumb{width:120px;flex-shrink:0;aspect-ratio:16/9;border-radius:8px;overflow:hidden;background:var(--surface2);position:relative;display:flex;align-items:center;justify-content:center;font-size:24px;}
.side-thumb img{width:100%;height:100%;object-fit:cover;}
.side-dur{position:absolute;bottom:3px;right:3px;background:rgba(0,0,0,.85);color:#fff;font-size:10px;padding:1px 3px;border-radius:3px;}
.side-meta{flex:1;min-width:0;}
.side-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.side-ch{font-size:11px;color:var(--text2);margin-top:3px;cursor:pointer;text-decoration:underline;}
.search-result{display:flex;gap:10px;padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--border);}
.sr-thumb{width:120px;flex-shrink:0;aspect-ratio:16/9;border-radius:8px;overflow:hidden;background:var(--surface2);position:relative;display:flex;align-items:center;justify-content:center;font-size:28px;}
.sr-thumb img{width:100%;height:100%;object-fit:cover;}
.sr-dur{position:absolute;bottom:3px;right:3px;background:rgba(0,0,0,.85);color:#fff;font-size:10px;padding:1px 3px;border-radius:3px;}
.sr-meta{flex:1;min-width:0;}
.sr-title{font-size:14px;font-weight:600;color:var(--text);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.sr-info{font-size:12px;color:var(--text2);margin-top:4px;}
.trend-card{display:flex;gap:10px;padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--border);align-items:flex-start;}
.trend-num{font-size:20px;font-weight:800;color:var(--text3);width:28px;flex-shrink:0;text-align:center;padding-top:4px;}
.trend-thumb{width:110px;flex-shrink:0;aspect-ratio:16/9;border-radius:8px;overflow:hidden;background:var(--surface2);position:relative;display:flex;align-items:center;justify-content:center;font-size:24px;}
.trend-thumb img{width:100%;height:100%;object-fit:cover;}
.trend-meta{flex:1;min-width:0;}
.trend-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.trend-info{font-size:12px;color:var(--text2);margin-top:4px;}
#shortsPage{display:none;position:fixed;inset:0;background:#000;z-index:300;}
#shortsPage.active{display:block;}
.shorts-topbar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:14px 16px;z-index:10;background:linear-gradient(rgba(0,0,0,.6),transparent);}
.shorts-topbar-title{font-size:16px;font-weight:700;color:#fff;}
.short-slide{position:absolute;inset:0;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.short-slide iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
.s-thumb{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.s-emoji{font-size:80px;position:relative;z-index:1;}
.short-play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:5;cursor:pointer;}
.short-play-btn{width:64px;height:64px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;backdrop-filter:blur(4px);}
.short-info{position:absolute;bottom:80px;left:12px;right:70px;z-index:6;}
.short-ch{font-size:14px;font-weight:700;color:#fff;margin-bottom:4px;}
.short-ttl{font-size:13px;color:rgba(255,255,255,.9);line-height:1.4;}
.short-views-b{font-size:12px;color:rgba(255,255,255,.7);margin-top:4px;}
.short-actions{position:absolute;right:10px;bottom:90px;display:flex;flex-direction:column;gap:18px;align-items:center;z-index:6;}
.s-act{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none;}
.s-act-icon{font-size:26px;}
.s-act-label{font-size:11px;color:rgba(255,255,255,.8);}
#channelPage{display:none;width:100%;padding-bottom:70px;}
#channelPage.active{display:block;}
.ch-page-topbar{display:flex;align-items:center;gap:8px;padding:10px 12px;position:sticky;top:0;background:var(--bg);z-index:100;border-bottom:1px solid var(--border);}
.ch-back{background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:4px;}
.ch-page-name{font-size:16px;font-weight:700;}
.ch-banner{width:100%;height:110px;}
.ch-header{padding:0 12px 14px;border-bottom:1px solid var(--border);}
.ch-header-row{display:flex;align-items:flex-end;gap:12px;margin-top:-28px;margin-bottom:8px;}
.ch-av-xl{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#fff;flex-shrink:0;border:3px solid var(--bg);}
.ch-name-xl{font-size:17px;font-weight:800;color:var(--text);}
.ch-handle{font-size:12px;color:var(--text2);}
.ch-stats{display:flex;gap:14px;margin:6px 0 10px;flex-wrap:wrap;}
.ch-stat{font-size:13px;color:var(--text2);}
.ch-stat b{color:var(--text);}
.ch-sub-btn{width:100%;padding:10px;background:var(--text);color:var(--bg);border:none;border-radius:20px;cursor:pointer;font-size:14px;font-weight:700;}
.ch-sub-btn.subbed{background:var(--surface2);color:var(--text);}
.ch-tabs{display:flex;border-bottom:1px solid var(--border);}
.ch-tab{flex:1;padding:10px;font-size:13px;color:var(--text3);cursor:pointer;border-bottom:3px solid transparent;border:none;background:none;text-align:center;}
.ch-tab.active{color:var(--accent);border-bottom:3px solid var(--accent);font-weight:600;}
.ch-vids-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px;}
.ch-vid{cursor:pointer;border-radius:8px;overflow:hidden;background:var(--surface);}
.ch-vid-thumb{width:100%;aspect-ratio:16/9;background:var(--surface2);position:relative;display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden;}
.ch-vid-thumb img{width:100%;height:100%;object-fit:cover;}
.ch-vid-dur{position:absolute;bottom:3px;right:3px;background:rgba(0,0,0,.85);color:#fff;font-size:10px;padding:1px 4px;border-radius:3px;font-weight:600;}
.ch-vid-info{padding:6px 8px 8px;}
.ch-vid-title{font-size:12px;font-weight:600;color:var(--text);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.ch-vid-stats{font-size:11px;color:var(--text2);margin-top:3px;}
.profile-header{background:linear-gradient(135deg,#ff0000,#cc0000);padding:30px 16px 20px;text-align:center;}
.profile-av{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#fff;margin:0 auto 10px;}
.profile-name{font-size:18px;font-weight:700;color:#fff;}
.profile-stats{display:flex;justify-content:center;gap:32px;margin-top:14px;}
.pstat{text-align:center;}
.pstat-num{font-size:18px;font-weight:700;color:#fff;}
.pstat-label{font-size:11px;color:rgba(255,255,255,.75);}
.menu-item{display:flex;align-items:center;gap:14px;padding:14px 16px;cursor:pointer;border-bottom:1px solid var(--border);font-size:14px;color:var(--text);}
.menu-icon{font-size:20px;width:24px;text-align:center;}
.loading{display:flex;flex-direction:column;gap:12px;padding:12px;}
.skel{background:var(--surface2);border-radius:8px;position:relative;overflow:hidden;}
.skel::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);animation:shim 1.5s infinite;}
@keyframes shim{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:#333;color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;max-width:90vw;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body data-theme="dark">

<div class="topbar" id="mainTopbar">
  <a class="brand" href="#" onclick="VT.showPage('home');return false;">
    <div class="brand-logo"></div>
    <div class="brand-name">View<b>Tube</b></div>
  </a>
  <div class="tb-search">
    <input type="text" id="searchInput" placeholder="Search videos..." onkeydown="if(event.key==='Enter')VT.doSearch(this.value)" autocomplete="off">
    <button onclick="VT.doSearch(document.getElementById('searchInput').value)">🔍</button>
  </div>
  <div class="tb-right">
    <button class="icon-btn" onclick="VT.toggleTheme()">🌓</button>
    <div class="avatar" onclick="VT.showPage('profile')">V</div>
  </div>
</div>

<div id="homePage" class="page active">
  <div class="chip-bar" id="chipBar"></div>
  <div id="homeContent"></div>
</div>

<div id="searchPage" class="page">
  <div id="searchContent" style="padding-top:8px;"></div>
</div>

<div id="trendingPage" class="page">
  <div style="padding:14px 12px 6px;font-size:18px;font-weight:800;">🔥 Trending</div>
  <div id="trendingContent"></div>
</div>

<div id="watchPage" class="page"></div>

<div id="channelPage">
  <div class="ch-page-topbar">
    <button class="ch-back" onclick="VT.closeChannel()">←</button>
    <span class="ch-page-name" id="chPageName">Channel</span>
  </div>
  <div class="ch-banner" id="chBanner"></div>
  <div class="ch-header">
    <div class="ch-header-row">
      <div class="ch-av-xl" id="chAvXL"></div>
      <div><div class="ch-name-xl" id="chNameXL"></div><div class="ch-handle" id="chHandle"></div></div>
    </div>
    <div class="ch-stats">
      <div class="ch-stat"><b id="chSubs">-</b> subscribers</div>
      <div class="ch-stat"><b id="chVids">-</b> videos</div>
      <div class="ch-stat"><b id="chViews">-</b> views</div>
    </div>
    <button class="ch-sub-btn" id="chSubBtn" onclick="VT.toggleChSub(this)">Subscribe</button>
  </div>
  <div class="ch-tabs">
    <button class="ch-tab active" onclick="VT.chTab(this,'videos')">Videos</button>
    <button class="ch-tab" onclick="VT.chTab(this,'about')">About</button>
  </div>
  <div id="chContent"></div>
</div>

<div id="shortsPage">
  <div class="shorts-topbar">
    <span class="shorts-topbar-title">⚡ Shorts</span>
    <button onclick="VT.closeShorts()" style="background:rgba(0,0,0,.5);border:none;color:#fff;font-size:13px;padding:6px 12px;border-radius:20px;cursor:pointer;">✕ Close</button>
  </div>
  <div id="shortSlide"></div>
</div>

<div id="profilePage" class="page">
  <div class="profile-header">
    <div class="profile-av">V</div>
    <div class="profile-name">ViewTube User</div>
    <div class="profile-stats">
      <div class="pstat"><div class="pstat-num" id="likedCount">0</div><div class="pstat-label">Liked</div></div>
      <div class="pstat"><div class="pstat-num" id="savedCount">0</div><div class="pstat-label">Saved</div></div>
      <div class="pstat"><div class="pstat-num" id="histCount">0</div><div class="pstat-label">Watched</div></div>
    </div>
  </div>
  <div class="menu-item" onclick="VT.toggleTheme()"><span class="menu-icon">🌓</span>Toggle Theme</div>
  <div class="menu-item" onclick="VT.showToast('📹 Coming soon!')"><span class="menu-icon">📹</span>Upload Video</div>
  <div class="menu-item" onclick="VT.showToast('🔔 Coming soon!')"><span class="menu-icon">🔔</span>Notifications</div>
  <div class="menu-item" onclick="VT.showToast('⚙️ Coming soon!')"><span class="menu-icon">⚙️</span>Settings</div>
</div>

<div class="bottom-nav" id="bottomNav">
  <button class="bn-item active" id="bn-home" onclick="VT.showPage('home')"><span class="bn-icon">🏠</span>Home</button>
  <button class="bn-item" id="bn-shorts" onclick="VT.openShorts()"><span class="bn-icon">⚡</span>Shorts</button>
  <button class="bn-item" id="bn-trending" onclick="VT.showPage('trending')"><span class="bn-icon">🔥</span>Trending</button>
  <button class="bn-item" id="bn-profile" onclick="VT.showPage('profile')"><span class="bn-icon">👤</span>You</button>
</div>

<div class="toast" id="toast"></div>

<script>
var VT = (function() {
  var COLORS=['#f44336','#e91e63','#9c27b0','#3f51b5','#2196f3','#00bcd4','#4caf50','#ff9800','#795548','#607d8b'];
  function clr(s){return COLORS[(s||'V').charCodeAt(0)%COLORS.length];}

  var G_HOME=[], G_TREND=[], G_SEARCH=[], G_SHORTS=[];
  var liked=[], saved=[], watchHist=[];
  var shortIdx=0, touchStartY=0, touchStartTime=0;
  var currentChannel='';

  var CHIPS=['All','Music','Gaming','News','Cricket','Coding','Comedy','Cooking','Tech','Science','Travel','Fitness'];
  var MOCK=[
    {id:'dQw4w9WgXcQ',title:'India vs England Test 2026 Day 2 Highlights',channel:'ESPN Cricinfo',views:'2.3M',ago:'2 hours ago',dur:'18:34',emoji:'🏏',cat:'Cricket',desc:'Full highlights from Day 2!'},

  function filterChip(el,cat){
    var chips=document.querySelectorAll('.chip');
    for(var i=0;i<chips.length;i++) chips[i].classList.remove('active');

  function renderShortSlide(idx){
    var shorts=G_SHORTS.length?G_SHORTS:MOCK_SHORTS;
    var s=shorts[idx]||MOCK_SHORTS[0];
    if(!s)return;
    var t=s.thumbnail?('<img class="s-thumb" src="'+s.thumbnail+'" onerror="this.style.display=\'none\'">'):'' ;
    var es=s.thumbnail?'display:none':'';
    var slide=document.getElementById('shortSlide');
    slide.innerHTML='<div class="short-slide" id="curShort">'+t+'<div class="s-emoji" style="'+es+'">'+(s.emoji||'▶️')+'</div>'+
      '<div class="short-play-overlay" id="shortPlayOverlay" onclick="VT.playShort(\''+s.id+'\')"><div class="short-play-btn">▶</div></div>'+
      '<div class="short-info"><div class="short-ch">'+(s.channel||'ViewTube')+'</div><div class="short-ttl">'+(s.title||'')+'</div><div class="short-views-b">👁 '+(s.views||'')+' views</div></div>'+
      '<div class="short-actions">'+
      '<button class="s-act" onclick="VT.showToast(\'👍 Liked!\')"><span class="s-act-icon">👍</span><span class="s-act-label">Like</span></button>'+
      '<button class="s-act" onclick="VT.showToast(\'💬 Coming!\')"><span class="s-act-icon">💬</span><span class="s-act-label">Comment</span></button>'+
      '<button class="s-act" onclick="VT.showToast(\'🔗 Shared!\')"><span class="s-act-icon">🔗</span><span class="s-act-label">Share</span></button>'+
      '</div>'+
      '<div style="position:absolute;bottom:16px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.5);font-size:12px;z-index:6;">'+(idx+1)+' / '+shorts.length+' ↑ swipe up for next</div></div>';
    slide.ontouchstart=function(e){touchStartY=e.touches[0].clientY;touchStartTime=Date.now();};
    slide.ontouchend=function(e){
      var dy=touchStartY-e.changedTouches[0].clientY;
      var dt=Date.now()-touchStartTime;
      var total=(G_SHORTS.length||MOCK_SHORTS.length);
      if(Math.abs(dy)>60&&dt<600){
        if(dy>0&&shortIdx<total-1){shortIdx++;renderShortSlide(shortIdx);}
        else if(dy<0&&shortIdx>0){shortIdx--;renderShortSlide(shortIdx);}
      }
    };
  }

    ifr.allow='autoplay;encrypted-media;fullscreen';
    ifr.allowFullscreen=true;
    slide.appendChild(ifr);
  }

  }

  function showPage(name){
    document.getElementById('channelPage').classList.remove('active');
    document.getElementById('mainTopbar').style.display='flex';
    document.getElementById('bottomNav').style.display='flex';
    var pages=['home','search','trending','watch','profile'];
    for(var i=0;i<pages.length;i++){var el=document.getElementById(pages[i]+'Page');if(el)el.classList.remove('active');}
    var el=document.getElementById(name+'Page');if(el)el.classList.add('active');
    var bns=document.querySelectorAll('.bn-item');
    for(var i=0;i<bns.length;i++) bns[i].classList.remove('active');
    var m={home:'bn-home',trending:'bn-trending',profile:'bn-profile'};
    if(m[name])document.getElementById(m[name]).classList.add('active');
    if(name!=='watch')window.scrollTo(0,0);
  }
  function toggleTheme(){
    var d=document.body.getAttribute('data-theme')==='dark';
    document.body.setAttribute('data-theme',d?'light':'dark');
    showToast(d?'☀️ Light mode':'🌙 Dark mode');
  }
  function updateStats(){
    document.getElementById('likedCount').textContent=liked.length;
    document.getElementById('savedCount').textContent=saved.length;
    document.getElementById('histCount').textContent=watchHist.length;
  }
  function showSkel(id){
    var html='<div class="loading">';
    for(var i=0;i<3;i++){html+='<div><div class="skel" style="width:100%;aspect-ratio:16/9;margin-bottom:8px;"></div><div style="display:flex;gap:10px;padding:0 12px;"><div class="skel" style="width:36px;height:36px;border-radius:50%;flex-shrink:0;"></div><div style="flex:1;"><div class="skel" style="height:14px;margin-bottom:6px;border-radius:4px;"></div><div class="skel" style="height:12px;width:60%;border-radius:4px;"></div></div></div></div>';}
    document.getElementById(id).innerHTML=html+'</div>';
  }
  function showToast(m){
    var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');
    setTimeout(function(){t.classList.remove('show');},2500);
  }

  window.onload=function(){
    initChips();
    loadHome();
    loadShorts();
    loadTrending();
  };

  return {
    showPage:showPage, filterChip:filterChip, openWatch:openWatch,
    playVid:playVid, toggleLike:toggleLike, toggleSave:toggleSave,
    toggleSub:toggleSub, postComment:postComment, openChannel:openChannel,
    renderChVids:renderChVids, chTab:chTab, toggleChSub:toggleChSub,
    closeChannel:closeChannel, openShorts:openShorts, closeShorts:closeShorts,
    playShort:playShort, doSearch:doSearch, toggleTheme:toggleTheme, showToast:showToast
  };
})();
</script>
</body>
</html>
